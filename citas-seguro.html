<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas - Universidad Carolina (Con Seguridad)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        /* Alertas */
        .alerta {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .alerta-error {
            background-color: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .alerta-success {
            background-color: #efe;
            color: #0a0;
            border: 1px solid #cfc;
        }

        .alerta-info {
            background-color: #eef;
            color: #00a;
            border: 1px solid #ccf;
        }

        /* Pasos */
        .paso {
            display: none;
        }

        .paso[data-paso-citas] {
            display: none;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        /* Botones */
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #999;
            margin-top: 10px;
        }

        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 5px 15px rgba(153, 153, 153, 0.4);
        }

        /* Indicador de progreso */
        .progress-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .step {
            flex: 1;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
        }

        .step.active {
            background: #667eea;
        }

        /* Estilos verificados */
        .verificado-check {
            color: #0a0;
            font-weight: bold;
            margin-left: 10px;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 500px) {
            .container {
                margin: 20px;
            }

            .content {
                padding: 20px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Agendar Cita</h1>
            <p>Proceso seguro de verificación</p>
        </div>

        <div class="content">
            <div id="alerta-citas" class="alerta"></div>

            <!-- PASO 1: Verificación de Email -->
            <div data-paso-citas="email" style="display: block;">
                <div class="progress-bar">
                    <div class="step active"></div>
                    <div class="step"></div>
                    <div class="step"></div>
                </div>

                <h3 style="margin-bottom: 20px; color: #333;">Paso 1: Verifica tu Email</h3>
                
                <div class="form-group">
                    <label for="email-citas">📧 Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email-citas" 
                        placeholder="tu@email.com"
                        required
                    >
                    <p class="info-text">Recibirás un código en este correo</p>
                </div>

                <button type="button" id="btn-enviar-codigo-citas">
                    📨 Enviar Código de Verificación
                </button>

                <p class="info-text" style="text-align: center; margin-top: 15px;">
                    Protegido con reCAPTCHA de Google
                </p>
            </div>

            <!-- PASO 2: Validar Código -->
            <div data-paso-citas="codigo">
                <div class="progress-bar">
                    <div class="step active"></div>
                    <div class="step active"></div>
                    <div class="step"></div>
                </div>

                <h3 style="margin-bottom: 20px; color: #333;">Paso 2: Ingresa el Código</h3>

                <div class="form-group">
                    <label for="codigo-citas">🔐 Código de Verificación (6 dígitos)</label>
                    <input 
                        type="text" 
                        id="codigo-citas" 
                        placeholder="000000"
                        maxlength="6"
                        pattern="\d{6}"
                        inputmode="numeric"
                    >
                    <p class="info-text">Revisa tu correo para el código. Expira en 15 minutos.</p>
                </div>

                <button type="button" id="btn-validar-codigo-citas">
                    ✅ Validar Código
                </button>

                <button type="button" class="btn-secondary" onclick="document.querySelector('[data-paso-citas=email]').style.display='block'; document.querySelector('[data-paso-citas=codigo]').style.display='none';">
                    ↩️ Volver
                </button>
            </div>

            <!-- PASO 3: Completar Cita -->
            <form id="formulario-citas" data-paso-citas="completar">
                <div class="progress-bar">
                    <div class="step active"></div>
                    <div class="step active"></div>
                    <div class="step active"></div>
                </div>

                <h3 style="margin-bottom: 20px; color: #333;">Paso 3: Completa tu Cita <span class="verificado-check">✓</span></h3>

                <div class="form-group">
                    <label for="nombre-citas">👤 Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre-citas" 
                        placeholder="Juan Pérez"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email-citas-form">📧 Correo (Verificado)</label>
                    <input 
                        type="email" 
                        id="email-citas-form" 
                        readonly
                        style="background: #f5f5f5;"
                    >
                </div>

                <div class="form-group">
                    <label for="servicio-citas">🏢 Tipo de Servicio</label>
                    <select id="servicio-citas" required>
                        <option value="">-- Selecciona un servicio --</option>
                        <option value="inscripcion">Inscripción</option>
                        <option value="constancia">Constancia</option>
                        <option value="beca">Beca</option>
                        <option value="club">Club</option>
                        <option value="asesoria">Asesoría</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fecha-citas">📅 Fecha y Hora</label>
                    <input 
                        type="datetime-local" 
                        id="fecha-citas"
                        required
                    >
                    <p class="info-text">Selecciona una fecha futura disponible</p>
                </div>

                <button type="submit">
                    🎫 Agendar Cita
                </button>

                <button type="button" class="btn-secondary" onclick="window.citasManager?.resetearFormulario(); document.querySelector('[data-paso-citas=email]').style.display='block'; document.querySelector('[data-paso-citas=completar]').style.display='none';">
                    ↩️ Cancelar
                </button>
            </form>
        </div>
    </div>

    <!-- reCAPTCHA v3 Script -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LeSKpksAAAAAHlRRFVkeSL9bTQwo-0NvAY0urtt"></script>

    <!-- Script de reCAPTCHA (se carga dinámicamente desde JS) -->
    <script src="js/citas-seguro.js"></script>

    <script>
        // Configuración inicial y manejo del mostrado del primer paso
        document.addEventListener('DOMContentLoaded', () => {
            // El manager se inicializa desde citas-seguro.js
            // Este script es complementario
            
            // Prevenir envío accidental con Enter en inputs
            document.getElementById('email-citas')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('btn-enviar-codigo-citas')?.click();
                }
            });

            document.getElementById('codigo-citas')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('btn-validar-codigo-citas')?.click();
                }
            });
        });
    </script>
</body>
</html>
